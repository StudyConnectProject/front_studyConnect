server {
    listen 80;
    server_name localhost;

    # ─── Auth Service (Java Spring Boot, puerto 8080) ────────────
    location /api/auth {
        proxy_pass http://auth-service:8080/api/auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── User Service (Node.js, puerto 3001) ─────────────────────
    location /api/users {
        proxy_pass http://user-service:3001/users;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── Chat Service REST (Node.js, puerto 3002) ────────────────
    location /api/conversations {
        proxy_pass http://chat-service:3002/conversations;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # ─── Analytics Service - Events (Node.js, puerto 3003) ───────
    location /api/events {
        proxy_pass http://analytics-service:3003/events;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── Analytics Service - Reports (Node.js, puerto 3003) ──────
    location /api/reports {
        proxy_pass http://analytics-service:3003/reports;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── Course Service (FastAPI, puerto 8000) ───────────────────
    location /api/v1/courses {
        proxy_pass http://course-service:8000/api/v1/courses;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # ─── Socket.IO WebSocket (Chat Service) ──────────────────────
    location /socket.io/ {
        proxy_pass http://chat-service:3002/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── Frontend (archivos estáticos) ───────────────────────────
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
