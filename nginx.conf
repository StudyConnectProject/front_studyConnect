# StudyConnect frontend — configuración nginx para Render.
#
# Render asigna el puerto en la variable ${PORT} (se sustituye al arrancar).
#
# PENDIENTE: cuando tengas las URLs de tus backends en Render, reemplaza los
# marcadores *_HOST por el hostname real (SIN https://, p. ej.
# "auth-service-xxxx.onrender.com"). Cada bloque tiene su marcador.
#
# Nota: se usan variables en proxy_pass a propósito, para que nginx NO intente
# resolver los hostnames al arrancar. Así el front se despliega aunque los
# backends todavía no existan (las llamadas /api/* darán 502 hasta que los
# configures, lo cual es lo esperado).

server {
    listen ${PORT};
    server_name _;

    # DNS para resolver los hostnames de los backends en tiempo de petición.
    resolver 8.8.8.8 1.1.1.1 valid=30s;

    # ─── Auth Service (la ruta /api/auth se conserva) ────────────
    location /api/auth {
        set $auth_host "AUTH_HOST";
        proxy_pass https://$auth_host;
        proxy_set_header Host $auth_host;
        proxy_ssl_server_name on;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── User Service (/api/users -> /users) ─────────────────────
    location /api/users {
        set $user_host "USER_HOST";
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass https://$user_host;
        proxy_set_header Host $user_host;
        proxy_ssl_server_name on;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── Chat Service REST (/api/conversations -> /conversations) ─
    location /api/conversations {
        set $chat_host "CHAT_HOST";
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass https://$chat_host;
        proxy_set_header Host $chat_host;
        proxy_ssl_server_name on;
        proxy_set_header Authorization $http_authorization;
    }

    # ─── Analytics - Events (/api/events -> /events) ─────────────
    location /api/events {
        set $analytics_host "ANALYTICS_HOST";
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass https://$analytics_host;
        proxy_set_header Host $analytics_host;
        proxy_ssl_server_name on;
    }

    # ─── Analytics - Reports (/api/reports -> /reports) ──────────
    location /api/reports {
        set $analytics_host "ANALYTICS_HOST";
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass https://$analytics_host;
        proxy_set_header Host $analytics_host;
        proxy_ssl_server_name on;
    }

    # ─── Course Service (la ruta /api/v1/courses se conserva) ────
    location /api/v1/courses {
        set $course_host "COURSE_HOST";
        proxy_pass https://$course_host;
        proxy_set_header Host $course_host;
        proxy_ssl_server_name on;
        proxy_set_header Authorization $http_authorization;
    }

    # ─── Matching Service (la ruta /api/matching se conserva) ────
    location /api/matching {
        set $matching_host "MATCHING_HOST";
        proxy_pass https://$matching_host;
        proxy_set_header Host $matching_host;
        proxy_ssl_server_name on;
        proxy_set_header Authorization $http_authorization;
    }

    # ─── Exam Service (la ruta /api/exams se conserva) ───────────
    location /api/exams {
        set $exam_host "EXAM_HOST";
        proxy_pass https://$exam_host;
        proxy_set_header Host $exam_host;
        proxy_ssl_server_name on;
        proxy_set_header Authorization $http_authorization;
    }

    # ─── Socket.IO WebSocket (Chat Service) ──────────────────────
    location /socket.io/ {
        set $chat_host "CHAT_HOST";
        proxy_pass https://$chat_host;
        proxy_set_header Host $chat_host;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ─── Frontend (archivos estáticos) ───────────────────────────
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
