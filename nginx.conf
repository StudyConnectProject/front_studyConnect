# StudyConnect frontend — configuración nginx para Render.
#
# El frontend llama directamente al API Gateway en https://apigateway-jvgb.onrender.com.
# Nginx sólo necesita servir los archivos estáticos del SPA y manejar el
# fallback de rutas hash (#/...) hacia index.html.
#
# Render asigna el puerto en la variable ${PORT} (se sustituye al arrancar).

server {
    listen ${PORT};
    server_name _;

    # ─── Frontend (archivos estáticos) ───────────────────────────
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}

