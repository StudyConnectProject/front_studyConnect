# StudyConnect frontend — configuración nginx para DESARROLLO LOCAL.
#
# Usa los nombres internos de los servicios de docker-compose.
# Para que el frontend use este proxy en lugar del gateway desplegado,
# establece BASE_URL = '' (vacío) en js/config.js al desarrollar localmente.
#
# Las rutas location coinciden exactamente con las que envía el JS
# (mismas rutas que expone el API Gateway en producción).

server {
    listen 80;
    server_name localhost;

    # ─── Auth Service (Java Spring Boot, puerto 8080) ────────────
    location /api/auth {
        proxy_pass http://auth-service:8080/api/auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── User Service (Node.js, puerto 3001) ─────────────────────
    location /api/users {
        proxy_pass http://user-service:3001/users;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── Chat Service REST (Node.js, puerto 3002) ────────────────
    location /api/chat/conversations {
        proxy_pass http://chat-service:3002/conversations;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # ─── Analytics Service - Events (Node.js, puerto 3003) ───────
    location /api/analytics/events {
        proxy_pass http://analytics-service:3003/events;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── Analytics Service - Reports (Node.js, puerto 3003) ──────
    location /api/analytics/reports {
        proxy_pass http://analytics-service:3003/reports;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── Course Service (FastAPI, puerto 8000) ───────────────────
    location /api/courses {
        proxy_pass http://course-service:8000/api/courses;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # ─── Matching Service (Go, puerto 8084) ──────────────────────
    location /api/matching {
        proxy_pass http://matching-service:8084/api/matching;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # ─── Exam Service (Node.js, puerto 8085) ─────────────────────
    location /api/exams {
        proxy_pass http://exam-service:8085/api/exams;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # ─── Socket.IO WebSocket (Chat Service) ──────────────────────
    location /socket.io/ {
        proxy_pass http://chat-service:3002/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── Frontend (archivos estáticos) ───────────────────────────
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
